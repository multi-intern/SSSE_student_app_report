<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appium Suite Execution Index</title>
    <style>
        :root {
            /* Trendy Premium Tech/SaaS Color Palette */
            --bg-main: #0B0F19;
            /* Deep rich space background */
            --card-dark: #1E293B;
            /* Cool slate surface card canvas */
            --card-hover: #26354A;
            /* Interactive hover state */
            --border-glow: rgba(99, 102, 241, 0.15);

            /* Gradient Anchors */
            --grad-start: #6366F1;
            /* Indigo */
            --grad-end: #A855F7;
            /* Purple */

            --fg-white: #F8FAFC;
            /* Crisp high-contrast off-white */
            --fg-gray: #94A3B8;
            /* Clean ash secondary text */

            /* Clean Indicators */
            --capsule-green: #10B981;
            /* Vibrant emerald */
            --capsule-red: #F43F5E;
            /* Neo rose/red */
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-main);
            color: var(--fg-white);
            margin: 0;
            padding: 60px 20px;
            min-height: 100vh;
            background-image:
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.08) 0px, transparent 50%);
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header-section {
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5em;
            font-weight: 800;
            margin: 0 0 10px 0;
            background: linear-gradient(135deg, var(--fg-white) 30%, var(--fg-gray) 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.025em;
        }

        .subtitle {
            color: var(--fg-gray);
            font-size: 1.1em;
            margin: 0;
            font-weight: 400;
        }

        .report-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-top: 20px;
        }

        .report-item {
            background: var(--card-dark);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .report-item:hover {
            transform: translateY(-4px);
            background: var(--card-hover);
            border-color: rgba(99, 102, 241, 0.3);
            box-shadow: 0 12px 30px rgba(99, 102, 241, 0.15);
        }

        .meta-info h3 {
            margin: 0 0 6px 0;
            font-size: 1.4em;
            font-weight: 700;
            letter-spacing: -0.01em;
        }

        .meta-info p {
            margin: 0;
            color: var(--fg-gray);
            font-size: 0.9em;
            font-family: monospace;
            /* Gives execution tracking ids a clean tech-look */
        }

        .stats {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .badge {
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.85em;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            backdrop-filter: blur(4px);
        }

        .badge.pass {
            background: rgba(16, 185, 129, 0.08);
            color: var(--capsule-green);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .badge.fail {
            background: rgba(244, 63, 94, 0.08);
            color: var(--capsule-red);
            border: 1px solid rgba(244, 63, 94, 0.2);
        }

        .view-btn {
            background: linear-gradient(135deg, var(--grad-start), var(--grad-end));
            color: #FFFFFF;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.9em;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
            transition: all 0.2s ease;
        }

        .view-btn:hover {
            box-shadow: 0 6px 20px rgba(168, 85, 247, 0.4);
            transform: scale(1.02);
            filter: brightness(1.1);
        }

        /* Modern loading state spinner */
        .loading-text {
            color: var(--fg-gray);
            font-size: 1em;
            text-align: center;
            padding: 40px 0;
            font-style: italic;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header-section">
            <h1>Unified Testing Suite</h1>
            <p class="subtitle">Continuous integration deployment historical indices</p>
        </div>
        <div class="report-list" id="reportsContainer">
            <div class="loading-text">Fetching structural pipeline records...</div>
        </div>
    </div>

    <script>
        // Dynamically fetch and build the interactive logs feed matrix
        fetch('reports.json')
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('reportsContainer');
                if (data.length === 0) {
                    container.innerHTML = `<div class="loading-text" style="font-style: normal;">✨ No testing sessions documented yet.</div>`;
                    return;
                }
                container.innerHTML = "";
                data.forEach(run => {
                    container.innerHTML += `
                        <div class="report-item">
                            <div class="meta-info">
                                <h3>${run.app_name.toUpperCase()}</h3>
                                <p style="color:var(--fg-gray); margin-bottom:4px;">${run.date}</p>
                                <p style="font-size:0.8em; opacity:0.6;">ID: ${run.id}</p>
                            </div>
                            <div class="stats">
                                <span class="badge pass">✓ ${run.working} Working</span>
                                <span class="badge fail">✗ ${run.non_working} Failed</span>
                                <a href="${run.url}" class="view-btn">Inspect Run</a>
                            </div>
                        </div>
                    `;
                });
            })
            .catch(err => {
                document.getElementById('reportsContainer').innerHTML = `
                    <div class="loading-text" style="color:var(--capsule-red); font-style:normal;">
                        ✕ Failed to pull active historical index configurations.
                    </div>`;
            });
    </script>
</body>

</html>
